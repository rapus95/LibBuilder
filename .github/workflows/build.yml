name: Build Custom Wasm-Opt Reactor
on: 
  workflow_dispatch:
    inputs:
      with_custom_pass:
        description: 'Inject InjectYields.cpp pass'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my repo
        uses: actions/checkout@v4
        with:
          path: 'my-repo'

      - name: Checkout Binaryen
        uses: actions/checkout@v4
        with: 
          repository: 'WebAssembly/binaryen'
          path: 'binaryen'
          fetch-depth: 1
          submodules: recursive
          
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: binaryen-wasi-ccache-${{ inputs.with_custom_pass }}
          max-size: 2G
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-x86_64-linux.tar.gz
          tar xvf wasi-sdk-33.0-x86_64-linux.tar.gz

      - name: Inject Custom Pass into Binaryen
        if: ${{ inputs.with_custom_pass }}
        run: |
          cp my-repo/InjectYields.cpp binaryen/src/passes/
          cd binaryen
          echo "target_sources(binaryen PRIVATE src/passes/InjectYields.cpp)" >> CMakeLists.txt
          sed -i '/namespace wasm {/a Pass* createInjectYieldsPass();' src/passes/pass.cpp
          sed -i '/registerPass("asyncify"/i \  registerPass("inject-yields", "Injects cooperative yielding checks", createInjectYieldsPass);' src/passes/pass.cpp

      - name: Create C++ Reactor Wrapper
        run: |
          cat << 'EOF' > binaryen/src/reactor-pipeline.cpp
          #include <stdlib.h>
          #include <string>
          #include <sstream>
          #include <cstring>
          #include <binaryen-c.h>
          #include "wasm.h"
          #include "pass.h"

          extern "C" {
              // Stub out exception functions for the WASI linker
              void* __cxa_allocate_exception(unsigned int thrown_size) { __builtin_trap(); return (void*)0; }
              void __cxa_throw(void *thrown_exception, void *tinfo, void (*dest)(void *)) { __builtin_trap(); }
              void* __cxa_begin_catch(void* exceptionObject) { __builtin_trap(); return (void*)0; }
              void __cxa_end_catch() { __builtin_trap(); }
              int __gxx_personality_v0(...) { __builtin_trap(); return 0; }

              struct OptimizeResult {
                  void* ptr;
                  size_t len;
              };

              __attribute__((export_name("host_malloc")))
              void* host_malloc(size_t size) { return malloc(size); }

              __attribute__((export_name("host_free")))
              void host_free(void* ptr) { free(ptr); }

              // i32 0 = WASM output, i32 1 = WAT output
              __attribute__((export_name("run_pipeline")))
              struct OptimizeResult* run_pipeline(void* input_ptr, size_t input_len, int output_wat) {
                  // 1. Read untrusted Wasm module (using stable C-API internally to manage AST)
                  BinaryenModuleRef module_ref = BinaryenModuleRead((char*)input_ptr, input_len);
                  wasm::Module* module = (wasm::Module*)module_ref;

                  // 2. Equivalent to --enable-custom-page-sizes
                  module->features.enable(wasm::FeatureSet::CustomPageSizes);

                  // 3. Equivalent to --pass-arg=...
                  wasm::PassOptions options;
                  options.arguments["asyncify-ignore-imports"] = "";
                  options.arguments["asyncify-memory"] = "yield_async_mem";
                  
                  // 4. Setup and run PassRunner
                  wasm::PassRunner runner(module, options);
                  runner.add("inject-yields"); // Added in your previous step!
                  runner.add("asyncify");
                  runner.run();

                  struct OptimizeResult* out_res = (struct OptimizeResult*)malloc(sizeof(struct OptimizeResult));

                  // 5. Generate Output
                  if (output_wat != 0) {
                      std::ostringstream ss;
                      ss << *module;
                      std::string wat = ss.str();
                      
                      out_res->len = wat.length();
                      out_res->ptr = malloc(out_res->len);
                      memcpy(out_res->ptr, wat.data(), out_res->len);
                  } else {
                      // Equivalent to writing standard WASM format
                      struct BinaryenModuleAllocateAndWriteResult res = BinaryenModuleAllocateAndWrite(module_ref, NULL);
                      out_res->len = res.binaryBytes;
                      out_res->ptr = res.binary; 
                      if (res.sourceMap) free(res.sourceMap);
                  }

                  BinaryenModuleDispose(module_ref);
                  return out_res;
              }
          }
          EOF

      - name: Build Binaryen Static Library
        run: |
          cd binaryen
          mkdir build && cd build
          
          # Patch the target
          sed -i 's/wasm32-wasi-threads/wasm32-wasip1-threads/g' $GITHUB_WORKSPACE/wasi-sdk-33.0-x86_64-linux/share/cmake/wasi-sdk-pthread.cmake
          
          cmake .. -G Ninja \
                   -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/wasi-sdk-33.0-x86_64-linux/share/cmake/wasi-sdk-pthread.cmake \
                   -DWASI_SDK_PREFIX=$GITHUB_WORKSPACE/wasi-sdk-33.0-x86_64-linux \
                   -DBUILD_TOOLS=OFF \
                   -DBUILD_TESTS=OFF \
                   -DBUILD_SHARED_LIBS=OFF \
                   -DBUILD_STATIC_LIB=ON \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                   -DCMAKE_CXX_FLAGS="-pthread -flto"
                   
          # Only build the static library, ignore the executables
          ninja binaryen -j4

      - name: Compile Custom WASI Reactor
        run: |
          cd binaryen
          # Link our custom reactor file against the compiled Binaryen lib
          $GITHUB_WORKSPACE/wasi-sdk-33.0-x86_64-linux/bin/clang++ \
            --target=wasm32-wasip1-threads -pthread -flto -O3 \
            -mexec-model=reactor \
            -I src \
            src/reactor-pipeline.cpp \
            build/lib/libbinaryen.a \
            -o build/wasm-opt-reactor.wasm \
            -Wl,--strip-all -Wl,--gc-sections

      - name: Meta-Optimize wasm-opt-reactor.wasm
        run: |
          wget https://github.com/WebAssembly/binaryen/releases/download/version_117/binaryen-version_117-x86_64-linux.tar.gz
          tar xvf binaryen-version_117-x86_64-linux.tar.gz
          
          ./binaryen-version_117/bin/wasm-opt binaryen/build/wasm-opt-reactor.wasm \
              -O4 \
              --all-features \
              --strip-producers \
              --strip-dwarf \
              -o binaryen/build/wasm-opt-reactor-shrunk.wasm
              
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-opt-reactor
          path: binaryen/build/wasm-opt-reactor-shrunk.wasm
