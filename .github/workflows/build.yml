name: Build wasm-opt.wasm
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          repository: 'WebAssembly/binaryen'
          fetch-depth: 0
          submodules: recursive
          
      - name: Install WASI SDK
        run: |
          wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz
          tar xvf wasi-sdk-22.0-linux.tar.gz
          
      - name: Build
        run: |
          mkdir build && cd build
          # THE FIX: Notice the "-pthread.cmake" at the end of the toolchain line!
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/wasi-sdk-22.0/share/cmake/wasi-sdk-pthread.cmake \
                   -DWASI_SDK_PREFIX=$GITHUB_WORKSPACE/wasi-sdk-22.0 \
                   -DBUILD_TOOLS=ON \
                   -DBUILD_TESTS=OFF
                   
          # Added -j to use all GitHub Action CPU cores (much faster)
          make wasm-opt -j$(nproc)
          
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-opt-binary
          path: build/bin/wasm-opt
