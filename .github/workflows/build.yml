name: Build wasm-opt.wasm
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          repository: 'WebAssembly/binaryen'
          fetch-depth: 0
          submodules: recursive
          
      - name: Install WASI SDK
        run: |
          wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz
          tar xvf wasi-sdk-22.0-linux.tar.gz
          
      - name: Build
        run: |
          # Patch CMakeLists.txt to remove the strict Threads requirement
          sed -i 's/find_package(Threads REQUIRED)//g' CMakeLists.txt
          sed -i 's/Threads::Threads//g' CMakeLists.txt
          
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/wasi-sdk-22.0/share/cmake/wasi-sdk.cmake \
                   -DWASI_SDK_PREFIX=$GITHUB_WORKSPACE/wasi-sdk-22.0 \
                   -DBUILD_TOOLS=ON \
                   -DBUILD_TESTS=OFF
          make wasm-opt
          
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-opt-binary
          path: build/bin/wasm-opt
