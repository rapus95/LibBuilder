name: Build wasm-opt.wasm
on: workflow_dispatch # Let's you click a button to start
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { repository: 'WebAssembly/binaryen', fetch-depth: 0 }
      - name: Install WASI SDK
        run: |
          wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz
          tar xvf wasi-sdk-22.0-linux.tar.gz
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/wasi-sdk-22.0/share/cmake/wasi-sdk.cmake \
                   -DWASI_SDK_PREFIX=$GITHUB_WORKSPACE/wasi-sdk-22.0 -DBUILD_TOOLS=ON \
                   -DCMAKE_USE_PTHREADS_INIT=OFF -DTHREADS_PREFER_PTHREAD_FLAG=OFF
          make wasm-opt
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-opt-binary
          path: build/bin/wasm-opt.wasm
